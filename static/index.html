<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Web Game Generator</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="controls-panel">
            <h1>AI Web Game Generator</h1>
            <p>Describe your game idea, and let Gemini build it for you in real-time.</p>
            
            <div id="initial-generation">
                <textarea id="prompt-input" placeholder="e.g., A simple Pong game with a red ball and blue paddles"></textarea>
                <button id="generate-btn">Generate Game</button>
            </div>

            <div id="modification-panel" class="hidden">
                <h3>Modify Your Game</h3>
                <p>Describe a change, add a feature, or report a bug.</p>
                <textarea id="modification-input" placeholder="e.g., Make the ball move faster, or fix the collision bug with the top wall"></textarea>
                <button id="modify-btn">Apply Modification</button>
                <button id="download-btn">Download HTML</button>
            </div>
             <div class="spinner-container hidden">
                <div class="spinner"></div>
                <p>AI is thinking...</p>
            </div>

            <div id="instructions-container" class="hidden">
                <h3>How to Play</h3>
                <div id="game-instructions"></div>
            </div>
        </div>

        <div class="output-panel">
            <div class="code-container">
                <h3>Generated Code</h3>
                <pre><code id="code-output" class="language-html"></code></pre>
            </div>
            <div class="game-container">
                <h3>Live Preview</h3>
                <iframe id="game-iframe" sandbox="allow-scripts" title="Generated Game"></iframe>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
